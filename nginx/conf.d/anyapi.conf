# www.anyapi.pro：HTTPS（443）+ 80 重定向到 HTTPS，并保留 ACME 校验路径
# doc.anyapi.pro：仅 HTTP（80）
#
# 证书：/etc/nginx/certs/<域名>/ 下为 fullchain.pem / privkey.pem 实体文件（自签）或指向 /etc/letsencrypt/live/ 的符号链接（LE）

upstream anyapi_upstream {
    server anyapi:3000;
    keepalive 32;
}

upstream docs_upstream {
    server docs:3000;
    keepalive 16;
}

# —— www：80 端口 —— ACME + 其余跳转到 HTTPS
server {
    listen 80;
    server_name www.anyapi.pro;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# —— www：443 HTTPS ——
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.anyapi.pro;

    ssl_certificate     /etc/nginx/certs/www.anyapi.pro/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/www.anyapi.pro/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # 正式证书就绪后再启用 HSTS（自签阶段会长期缓存错误证书，勿开）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://anyapi_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# —— doc：仅 HTTP ——
server {
    listen 80;
    server_name doc.anyapi.pro;

    location / {
        proxy_pass http://docs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}
