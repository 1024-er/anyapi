# nginx/conf.d/www.anyapi.pro.conf
# HTTP 服务器 - 用于证书申请和重定向
server {
    listen 80;
    server_name www.anyapi.pro anyapi.pro;
    
    # 证书验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 重定向到HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name www.anyapi.pro anyapi.pro;
    
    # SSL证书路径（指向挂载目录）
    ssl_certificate /etc/nginx/ssl/live/www.anyapi.pro/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/www.anyapi.pro/privkey.pem;
    
    # 包含SSL参数
    include /etc/nginx/conf.d/ssl-params.conf;
    
    # 根目录
    root /var/www/anyapi;
    index index.html index.htm;
    
    # 日志
    access_log /var/log/nginx/anyapi.access.log;
    error_log /var/log/nginx/anyapi.error.log;
    
    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 主location
    location / {
        try_files $uri $uri/ =404;
    }
    
    # 安全头部
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}