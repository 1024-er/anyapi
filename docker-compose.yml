# 对外入口：nginx（80/443）→ anyapi、docs。主站 www.anyapi.pro，文档 doc.anyapi.pro
services:
  anyapi:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: anyapi
    restart: always
    command: --log-dir /app/logs
    expose:
      - "3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      # - SQL_DSN=postgresql://root:123456@postgres:5432/db_anyapi # ⚠️ IMPORTANT: Change the password in production!
      - SQL_DSN=root:anyapi321@tcp(mysql:3306)/db_anyapi  # Point to the mysql service, uncomment if using MySQL
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！！ （multi-node deployment, set this to a random string!!!!!!!）
#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      # - postgres
      - mysql  # Uncomment if using MySQL
    networks:
      - anyapi-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    container_name: anyapi-docs
    restart: always
    expose:
      - "3000"
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
    networks:
      - anyapi-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode>=200&&r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: anyapi-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    # Compose 会从项目根目录 .env 做变量替换。若 shell 里 export 了空的 CERTBOT_EMAIL，会覆盖 .env，导致容器内无邮箱、certbot 不跑。
    # 若遇此情况请先执行：unset CERTBOT_EMAIL
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-anyapipro@gmail.com}
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-www.anyapi.pro}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-0}
      # 手动续期：docker compose exec nginx renew-cert   强制：docker compose exec nginx renew-cert --force
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # 证书输出目录（entrypoint 会写入 fullchain.pem / privkey.pem）
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/certbot-www:/var/www/certbot
      # certbot 账户与证书链持久化
      - letsencrypt:/etc/letsencrypt
    depends_on:
      anyapi:
        condition: service_healthy
      docs:
        condition: service_healthy
    networks:
      - anyapi-network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - anyapi-network

#   postgres:
#     image: postgres:15
#     container_name: postgres
#     restart: always
#     environment:
#       POSTGRES_USER: root
#       POSTGRES_PASSWORD: 123456  # ⚠️ IMPORTANT: Change this password in production!
#       POSTGRES_DB: db_anyapi
#     volumes:
#       - pg_data:/var/lib/postgresql/data
#     networks:
#       - anyapi-network
# #    ports:
# #      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

  mysql:
    image: mysql:8.2
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: anyapi321  # ⚠️ IMPORTANT: Change this password in production!
      MYSQL_DATABASE: db_anyapi
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - anyapi-network
    ports:
      - "127.0.0.1:3306:3306"  # 仅本机访问；远程管理可用 SSH 隧道

volumes:
  # pg_data:
  mysql_data:
  letsencrypt:

networks:
  anyapi-network:
    driver: bridge
