# 对外入口：nginx（80/443）→ anyapi、docs。主站 www.anyapi.pro，文档 doc.anyapi.pro
services:
  anyapi:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: anyapi
    restart: always
    command: --log-dir /app/logs
    expose:
      - "3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:anyapi321@postgres:5432/db_anyapi # ⚠️ IMPORTANT: Change the password in production!
      # - SQL_DSN=root:anyapi321@tcp(mysql:3306)/db_anyapi  # Point to the mysql service, uncomment if using MySQL
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！！ （multi-node deployment, set this to a random string!!!!!!!）
#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      - postgres
      # - mysql  # Uncomment if using MySQL
    networks:
      - anyapi-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx-certbot:
    build: .
    container_name: nginx-anyapi
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 挂载Nginx配置目录
      - ./nginx/conf.d:/etc/nginx/conf.d
      # 挂载证书目录（双向同步）
      - ./nginx/certs:/etc/nginx/ssl
      - ./nginx/certs:/etc/letsencrypt
      # 挂载站点文件
      - ./anyapi:/var/www/anyapi
      - ./docs:/var/www/docs
      # 挂载脚本目录
      - ./nginx/scripts:/usr/local/scripts
      # 挂载日志目录
      - ./logs:/var/log/nginx
      - ./logs:/var/log/letsencrypt
    environment:
      - TZ=Asia/Shanghai
      - EMAIL=tonystarkcba@gmail.com
      - DOMAINS=www.anyapi.pro,docs.anyapi.pro
    depends_on:
      anyapi:
        condition: service_healthy
    networks:
      - anyapi-network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - anyapi-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: anyapi321  # ⚠️ IMPORTANT: Change this password in production!
      POSTGRES_DB: db_anyapi
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - anyapi-network
    ports:
      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

  # mysql:
  #   image: mysql:8.2
  #   container_name: mysql
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: anyapi321  # ⚠️ IMPORTANT: Change this password in production!
  #     MYSQL_DATABASE: db_anyapi
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   networks:
  #     - anyapi-network
  #   ports:
  #     - "127.0.0.1:3306:3306"  # 仅本机访问；远程管理可用 SSH 隧道

volumes:
  pg_data:
  # mysql_data:
  letsencrypt:

networks:
  anyapi-network:
    driver: bridge
